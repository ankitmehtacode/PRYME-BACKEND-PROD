# ═══════════════════════════════════════════════════════════════════════════════
# 🧠 PRYME PRODUCTION NGINX — ZERO-TRUST REVERSE PROXY
# ═══════════════════════════════════════════════════════════════════════════════
# Architecture:
#   /                 → Static React SPA from /usr/share/nginx/html
#   /api/v1/          → Reverse proxy to Spring Boot (pryme-backend:8080)
#   /api/v1/stream/   → SSE-specific proxy (buffering disabled)
#   /actuator/health  → Health check pass-through (no access log spam)
#
# Security Headers:  Duplicated from Spring as defense-in-depth at the edge.
# SPA Fallback:      try_files ensures React Router works on hard refresh.
# ═══════════════════════════════════════════════════════════════════════════════

upstream pryme_backend {
    # 🧠 CLOSED-LOOP: Must match server.port in application.yml (8082)
    server pryme-backend:8082;
    keepalive 32;
}

server {
    listen 80;
    server_name crm.pryme.in pryme.in;
    client_max_body_size 15m;

    # ── GLOBAL SECURITY HEADERS (Defense-in-Depth) ─────────────────────────
    add_header X-Content-Type-Options  "nosniff"              always;
    add_header X-Frame-Options         "SAMEORIGIN"           always;
    add_header X-XSS-Protection        "1; mode=block"        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── STATIC SPA SERVING ─────────────────────────────────────────────────
    # Serves the React production build.
    # try_files implements SPA routing — any unknown path falls back to index.html
    # so React Router handles it client-side instead of returning 404.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Aggressive caching for hashed Vite assets (immutable fingerprints)
        location ~* ^/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── SSE STREAM PROXY (SPECIAL HANDLING) ────────────────────────────────
    # SSE requires buffering OFF — otherwise Nginx holds events in memory
    # and delivers them in bulk instead of streaming them in real-time.
    location /api/v1/stream/ {
        proxy_pass              http://pryme_backend;
        proxy_http_version      1.1;

        # 🧠 CRITICAL FOR SSE: Disable all buffering and caching
        proxy_buffering         off;
        proxy_cache             off;
        chunked_transfer_encoding off;

        # SSE connections are long-lived — extend timeouts
        proxy_read_timeout      300s;  # 5 minutes (matches SseEmitter timeout)
        proxy_send_timeout      300s;

        # Preserve original client information
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
    }

    # ── API REVERSE PROXY ──────────────────────────────────────────────────
    # All /api/v1/ requests are forwarded to the Spring Boot container.
    # Header preservation ensures rate limiting and audit logging work correctly.
    location /api/v1/ {
        proxy_pass              http://pryme_backend;
        proxy_http_version      1.1;
        proxy_read_timeout      60s;
        proxy_connect_timeout   10s;

        # Preserve original client information
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "keep-alive";
    }

    # ── SWAGGER / API DOCS PROXY ──────────────────────────────────────────
    location /swagger-ui/ {
        proxy_pass http://pryme_backend;
        proxy_set_header Host $host;
    }
    location /api-docs {
        proxy_pass http://pryme_backend;
        proxy_set_header Host $host;
    }

    # ── HEALTH CHECK (No access log to reduce noise) ──────────────────────
    location /actuator/health {
        proxy_pass http://pryme_backend;
        access_log off;
    }

    # ── BLOCK SENSITIVE ACTUATOR ENDPOINTS AT EDGE ────────────────────────
    location /actuator/ {
        deny all;
        return 403;
    }

    # ── ERROR HANDLING ─────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
