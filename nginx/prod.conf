# ═══════════════════════════════════════════════════════════════════════════════
# 🧠 PRYME API GATEWAY — ZERO-TRUST REVERSE PROXY
# ═══════════════════════════════════════════════════════════════════════════════

upstream pryme_backend {
    server pryme-backend:8082;
    keepalive 32;
}

server {
    listen 80;
    # 🧠 Only listen for the API subdomain (Vercel handles the root domain)
    server_name api.gopryme.tech; 
    client_max_body_size 15m;

    # ── GLOBAL SECURITY HEADERS ──────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── SSE STREAM PROXY (No Buffering) ──────────────────────────────────
    location /api/v1/stream/ {
        proxy_pass http://pryme_backend;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
    }

    # ── ALL OTHER API TRAFFIC ────────────────────────────────────────────
    # Route ALL root traffic directly to the backend API
    location / {
        proxy_pass http://pryme_backend;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Idempotency-Key $http_idempotency_key;
    }
}
