# 🧠 Database: Neon Serverless Postgres (managed cloud) — no local DB container needed.

services:
  pryme-redis:
    image: redis:7-alpine
    container_name: pryme-redis-prod
    restart: always
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pryme_network

  pryme-backend:
    build: .
    container_name: pryme-backend-prod
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # 🧠 Neon Cloud DB — injected from .env written by CI/CD pipeline
      - SPRING_DATASOURCE_URL=${PROD_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${PROD_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${PROD_DB_PASSWORD}
      - PROD_JWT_SECRET=${PROD_JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - SPRING_DATA_REDIS_HOST=pryme-redis
      - SPRING_DATA_REDIS_PORT=6379
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    depends_on:
      pryme-redis:
        condition: service_healthy
    networks:
      - pryme_network

  pryme-nginx:
    image: nginx:alpine
    container_name: pryme-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      pryme-backend:
        condition: service_healthy
    networks:
      - pryme_network

networks:
  pryme_network:
    driver: bridge
