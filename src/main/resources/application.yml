# ==========================================
# 🧠 TOP 1% SILICON VALLEY PRODUCTION CONFIG
# Architecture: Modular Monolith (Java 21 + Spring Boot 3)
# Target Capacity: 4,000 Concurrent Users
# ==========================================

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  default-produces-media-type: application/json

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: pryme-backend

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  # ==========================================
  # 🧠 1. HIKARI-CP COMPRESSION MATRIX (POSTGRESQL)
  # Multiplexes 4000 network requests through exactly 150 DB connections
  # ==========================================
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pryme_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false          # CRITICAL: Aligns with provider_disables_autocommit below to fix transaction bugs.
      maximum-pool-size: 150      # Hard ceiling. Prevents DB RAM starvation under heavy load.
      minimum-idle: 5             # Elastic Scale-Down: Drops to 5 connections at 3 AM to save resources.
      connection-timeout: 20000   # Fails fast if DB is unreachable, preventing thread pileups.
      idle-timeout: 300000        # Kills inactive connections after 5 minutes.
      max-lifetime: 1200000       # Cycles connections every 20 minutes to prevent driver memory leaks.
      leak-detection-threshold: 2000 # 🧠 Top 1% Rule: Logs a stack trace if a transaction takes >2s.

  # ==========================================
  # 🧠 2. DISTRIBUTED CACHE MATRIX (REDIS)
  # Powers horizontal rate-limiting across N-pods seamlessly.
  # ==========================================
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000

  # ==========================================
  # 🧠 3. JPA & HIBERNATE BATCH OPTIMIZATION
  # ==========================================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:validate} # Flyway owns schema. Hibernate only validates entity mapping.
    open-in-view: false            # CRITICAL: Disables OSIV to prevent silent DB connection hoarding.
    show-sql: false                # Keep false in prod to save Disk I/O.
    properties:
      hibernate:
        jdbc:
          batch_size: 50           # 🧠 Network optimization: Sends 50 inserts in a single TCP packet.
        order_inserts: true        # Required for batching to actually work.
        order_updates: true
        format_sql: false
        connection:
          provider_disables_autocommit: true

  # ==========================================
  # 🧠 3. MULTIPART INGESTION ENGINE (THE VAULT)
  # ==========================================
  servlet:
    multipart:
      max-file-size: 10MB          # Strict limit enforced at the Tomcat boundary.
      max-request-size: 15MB       # Buffer room for the JSON payload surrounding the file.

# ==========================================
# 🧠 4. ELASTIC BREATHING WEB SERVER (TOMCAT)
# ==========================================
server:
  port: 8082
  shutdown: graceful               # Guarantees active payments/uploads finish before a server restart.
  tomcat:
    threads:
      max: 1000                    # Spike Absorber: Spins up 1000 worker threads during marketing pushes.
      min-spare: 10                # Elastic Scale-Down: Kills 990 threads when traffic dies.
    accept-count: 1000             # OS-level queue. Prevents "Connection Refused" during massive traffic spikes.
    max-connections: 8000          # Keeps lightweight TCP sockets open for 8000 users.
    connection-timeout: 20000
  compression:
    enabled: true                  # Compresses massive JSON payloads automatically.
    min-response-size: 1024
    mime-types: application/json,text/html,text/plain

# ==========================================
# 🧠 5. DOMAIN CONFIGURATIONS & SECURITY
# ==========================================
app:
  # 🧠 SESSION COOKIE CONFIGURATION (Replaces dead JWT config — verified zero code references to app.jwt.*)
  session:
    cookie-name: PRYME_SID                    # HttpOnly cookie name — scoped to /api path
    ttl-seconds: 3600                          # 1 Hour Strict TTL for Financial Compliance
    cookie-secure: ${COOKIE_SECURE:true}       # Set to false ONLY for local HTTP dev (never in prod)
  documents:
    storage-root: ${VAULT_DIR:./secure_vault} # OS-Agnostic absolute path configuration.
  security:
    # 🧠 Dynamic CORS Whitelist: Supports standard Vite, alternative Vite, and Prod domains.
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8081,https://gopryme.tech}

# ==========================================
# 🧠 6. TELEMETRY & AUDIT MATRIX (ACTUATOR)
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus # 🧠 Required for Grafana/Datadog monitoring.
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never # Prevents leaking DB hostnames to unauthorized users.
  metrics:
    tags:
      application: pryme-modular-monolith
