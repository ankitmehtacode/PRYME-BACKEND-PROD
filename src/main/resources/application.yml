springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  default-produces-media-type: application/json

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: pryme-backend

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pryme_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      # Keep JVM pool intentionally small when using Neon + PgBouncer transaction pooling.
      maximum-pool-size: ${DB_POOL_MAX:24}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      connection-timeout: ${DB_CONN_TIMEOUT_MS:3000}
      idle-timeout: 60000
      max-lifetime: 900000
      keepalive-time: 30000
      validation-timeout: 1000
      leak-detection-threshold: 0
      pool-name: PrymeHikariPool

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: false
        connection:
          provider_disables_autocommit: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8082
  shutdown: graceful
  tomcat:
    # Lower platform-thread count and let virtual threads absorb request concurrency.
    threads:
      max: ${TOMCAT_MAX_THREADS:300}
      min-spare: ${TOMCAT_MIN_SPARE:20}
    accept-count: ${TOMCAT_ACCEPT_COUNT:1000}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:4096}
    connection-timeout: 20000
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,text/html,text/plain

app:
  recommendation:
    max-results: ${RECO_MAX_RESULTS:8}
    candidate-pool-size: ${RECO_CANDIDATE_POOL_SIZE:500}
main
  session:
    cookie-name: PRYME_SID
    ttl-seconds: 3600
    cookie-secure: ${COOKIE_SECURE:true}
  documents:
    storage-root: ${VAULT_DIR:./secure_vault}
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8081,https://gopryme.tech,https://www.gopryme.tech}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: pryme-modular-monolith
