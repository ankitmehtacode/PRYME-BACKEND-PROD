spring:
  application:
    name: pryme-backend
  datasource:
    url: jdbc:h2:mem:pryme_db
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update # For the H2 database, we'll let it auto-create tables
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080