# 🧠 SECURITY: Disable Swagger/API Docs in Production
# Prevents attackers from viewing the full API schema at /swagger-ui.html
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: PrymeHikariPool
      leak-detection-threshold: 10000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          fetch_size: 50
          order_inserts: true
          order_updates: true
          generate_statistics: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: never
      probes:
        enabled: true
    info:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  server:
    port: 8081

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION:ap-south-1}

app:
  webhooks:
    sns:
      shared-secret: ${WEBHOOK_SECRET:dummy_webhook_secret_for_testing}
  session:
    # 🧠 PRODUCTION: Cookie domain allows sharing across subdomains (crm.pryme.in, api.pryme.in)
    # Remove this line if running on a single domain behind Nginx reverse proxy
    cookie-domain: ${COOKIE_DOMAIN:}
    cookie-secure: true
  security:
    # 🧠 PRODUCTION: ONLY allow the actual frontend domains. ZERO localhost.
    # Anyone trying to make cross-origin requests from localhost will be blocked.
    allowed-origins: ${ALLOWED_ORIGINS:https://gopryme.tech,https://www.gopryme.tech,https://api.gopryme.tech}
    # 🧠 CSP connect-src: If the frontend and API are on the same domain behind Nginx,
    # 'self' is sufficient. If they're on different subdomains, set this explicitly.
    csp-connect-src: ${CSP_CONNECT_SRC:}
