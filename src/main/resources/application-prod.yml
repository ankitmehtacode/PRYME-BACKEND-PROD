springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:24}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      connection-timeout: ${DB_CONN_TIMEOUT_MS:3000}
      idle-timeout: 60000
      max-lifetime: 900000
      keepalive-time: 30000
      validation-timeout: 1000
      pool-name: PrymeHikariPool
      leak-detection-threshold: 0
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          fetch_size: 50
          order_inserts: true
          order_updates: true
          generate_statistics: false

server:
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:300}
      min-spare: ${TOMCAT_MIN_SPARE:20}
    accept-count: ${TOMCAT_ACCEPT_COUNT:1000}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:4096}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: never
      probes:
        enabled: true
    info:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  server:
    port: 8081

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION:ap-south-1}

app:
  webhooks:
    sns:
      shared-secret: ${WEBHOOK_SECRET:dummy_webhook_secret_for_testing}
  session:
    cookie-domain: ${COOKIE_DOMAIN:}
    cookie-secure: true
  security:
    allowed-origins: ${ALLOWED_ORIGINS:https://gopryme.tech,https://www.gopryme.tech,https://api.gopryme.tech}
    csp-connect-src: ${CSP_CONNECT_SRC:}
