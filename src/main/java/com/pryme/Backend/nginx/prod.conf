# 🧠 SEO PROTOCOL: 301 Redirect .com to .in to prevent Duplicate Content penalties
server {
    listen 80;
    server_name gopryme.com www.gopryme.com;

    # Permanently redirect all traffic to .in
    return 301 http://gopryme.in$request_uri;
}

# MAIN APPLICATION SERVER
server {
    listen 80;
    server_name gopryme.in www.gopryme.in;

    # GZIP Compression for network speed
    gzip on;
    gzip_types text/plain application/json;
    gzip_min_length 1000;

    location / {
        # Proxy traffic directly into the Spring Boot container via Docker internal DNS
        proxy_pass http://pryme-backend:8080;

        # Forward client IP metadata for the IAM Security Audit Logs
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}