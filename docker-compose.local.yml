services:
  pryme-db:
    image: postgres:15-alpine
    container_name: pryme-postgres-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pryme_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pryme_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - pryme_local_pgdata:/var/lib/postgresql/data
    networks:
      - pryme_local_network

  # 🧠 1% FIX: Added the critical Redis caching layer for Rate Limiting and Sessions
  pryme-redis:
    image: redis:7-alpine
    container_name: pryme-redis-local
    # No host-port binding to prevent Mac port exhaustion
    networks:
      - pryme_local_network

  pryme-backend:
    build: .
    container_name: pryme-backend-local
    ports:
      # 🧠 CLOSED-LOOP: Must match server.port in application.yml (8082)
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=jdbc:postgresql://pryme-db:5432/pryme_db
      - DB_USER=postgres
      - DB_PASS=password
      # 🧠 1% FIX: Reroute Spring Data Redis to the internal Docker container
      - SPRING_DATA_REDIS_HOST=pryme-redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      pryme-db:
        condition: service_healthy
      pryme-redis:
        condition: service_started
    networks:
      - pryme_local_network

volumes:
  pryme_local_pgdata:

networks:
  pryme_local_network:
    driver: bridge