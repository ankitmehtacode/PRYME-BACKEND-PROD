services:
  pryme-db:
    image: postgres:15-alpine
    container_name: pryme-postgres-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pryme_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pryme_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - pryme_local_pgdata:/var/lib/postgresql/data
    networks:
      - pryme_local_network

  # 🧠 1% FIX: Added the critical Redis caching layer for Rate Limiting and Sessions
  pryme-redis:
    image: redis:7-alpine
    container_name: pryme-redis-local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pryme_local_network

  pryme-backend:
    build: .
    container_name: pryme-backend-local
    ports:
      # 🧠 CLOSED-LOOP: Must match server.port in application.yml (8082)
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://pryme-db:5432/pryme_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_DATA_REDIS_HOST=pryme-redis
      - SPRING_DATA_REDIS_PORT=6379
      # S3 placeholders — no real credentials in local dev, bucket ping is caught & warns safely
      - AWS_S3_REGION=ap-south-1
      - AWS_S3_BUCKET=pryme-local-placeholder
      # SNS webhook shared secret — must be non-null; no real SNS traffic in local dev
      - APP_WEBHOOKS_SNS_SHARED_SECRET=local-dev-sns-secret
    depends_on:
      pryme-db:
        condition: service_healthy
      pryme-redis:
        condition: service_healthy
    networks:
      - pryme_local_network

volumes:
  pryme_local_pgdata:

networks:
  pryme_local_network:
    driver: bridge