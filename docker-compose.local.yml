version: '3.8'

services:
  pryme-db:
    image: postgres:15-alpine
    container_name: pryme-postgres-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pryme_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432" # Exposed for local DB GUI inspection
    volumes:
      - pryme_local_pgdata:/var/lib/postgresql/data

  pryme-backend:
    depends_on:
      pryme-db:
        condition: service_healthy
    build: .
    container_name: pryme-backend-local
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=jdbc:postgresql://pryme-db:5432/pryme_db
      - DB_USER=postgres
      - DB_PASS=password

volumes:
  pryme_local_pgdata:
