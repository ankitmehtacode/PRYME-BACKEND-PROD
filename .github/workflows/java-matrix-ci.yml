name: 🚀 PRYME Backend CI/CD — KVM4 Hostinger

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # STAGE 1: Build & Test
  # ─────────────────────────────────────────
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: 🔧 Fix mvnw permissions (Windows CRLF safe)
        run: |
          sed -i 's/\r$//' mvnw
          chmod +x mvnw

      - name: 🏗️ Build JAR (skip tests for speed)
        run: ./mvnw clean package -DskipTests -B

      - name: ✅ Run Tests
        run: ./mvnw test -B
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.PROD_DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.PROD_DB_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          SPRING_PROFILES_ACTIVE: prod

  # ─────────────────────────────────────────
  # STAGE 2: Deploy to KVM4 Hostinger
  # Only runs on push to main (not PRs)
  # ─────────────────────────────────────────
  deploy:
    name: 🚢 Deploy to KVM4 Hostinger
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 SSH Deploy to Hostinger KVM4
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.127.138.20
          username: root
          key: ${{ secrets.KVM4_SSH_KEY }}
          port: 22
          envs: PROD_DB_URL,PROD_DB_USER,PROD_DB_PASSWORD,PROD_JWT_SECRET,ALLOWED_ORIGINS
          script: |
            set -e

            echo "📁 Navigating to project directory..."
            cd /root/PRYME-BACKEND-PROD

            echo "⬇️ Pulling latest code from GitHub..."
            git pull origin main

            echo "🔑 Writing .env file securely..."
            cat > .env <<EOF
            PROD_DB_URL=${PROD_DB_URL}
            PROD_DB_USER=${PROD_DB_USER}
            PROD_DB_PASSWORD=${PROD_DB_PASSWORD}
            SPRING_PROFILES_ACTIVE=prod
            PROD_JWT_SECRET=${PROD_JWT_SECRET}
            ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
            EOF
            chmod 600 .env

            echo "🐳 Rebuilding Docker image and restarting containers..."
            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            echo "🧹 Cleaning up unused Docker images..."
            docker image prune -f

            echo "✅ Deployment complete!"
